<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
            padding: 20px;
        }
        
        .dashboard-header {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px;
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
            backdrop-filter: blur(10px);
        }
        
        .dashboard-header h1 {
            font-size: 2rem;
            margin-bottom: 10px;
            background: linear-gradient(45deg, #00d2ff, #3a7bd5);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .dashboard-header .subtitle { color: #8892b0; font-size: 0.9rem; }
        .update-time { color: #64ffda; font-size: 0.85rem; margin-top: 10px; }
        
        .kpi-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .kpi-card {
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            padding: 25px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
            transition: transform 0.3s, box-shadow 0.3s;
        }
        
        .kpi-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        
        .kpi-card.plan { border-left: 4px solid #ff9f43; }
        .kpi-card.actual { border-left: 4px solid #00d2ff; }
        .kpi-card.diff-positive { border-left: 4px solid #00ff88; }
        .kpi-card.diff-negative { border-left: 4px solid #ff6b6b; }
        
        .kpi-value { font-size: 2.5rem; font-weight: bold; margin: 10px 0; }
        .kpi-card.plan .kpi-value { color: #ff9f43; }
        .kpi-card.actual .kpi-value { color: #00d2ff; }
        .kpi-card.diff-positive .kpi-value { color: #00ff88; }
        .kpi-card.diff-negative .kpi-value { color: #ff6b6b; }
        
        .kpi-label { color: #8892b0; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px; }
        .kpi-sub { color: #64ffda; font-size: 0.8rem; margin-top: 5px; }
        
        .charts-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(500px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .chart-card {
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            padding: 20px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        .chart-card h3 { color: #ccd6f6; margin-bottom: 15px; font-size: 1.1rem; }
        .chart-wrapper { position: relative; height: 350px; }
        
        .progress-section {
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 30px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        .progress-section h3 { color: #ccd6f6; margin-bottom: 20px; }
        .progress-bar-container { margin-bottom: 20px; }
        .progress-label { display: flex; justify-content: space-between; margin-bottom: 8px; color: #8892b0; }
        
        .progress-bar {
            height: 25px;
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
            overflow: hidden;
        }
        
        .progress-fill {
            height: 100%;
            border-radius: 15px;
            transition: width 1s ease-out;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding-right: 10px;
            font-size: 0.85rem;
            font-weight: bold;
        }
        
        .progress-fill.plan { background: linear-gradient(90deg, #ff9f43, #ffbe76); }
        .progress-fill.actual { background: linear-gradient(90deg, #00d2ff, #00e5ff); }
        
        .table-section {
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            padding: 20px;
            border: 1px solid rgba(255,255,255,0.1);
            overflow-x: auto;
        }
        
        .table-section h3 { color: #ccd6f6; margin-bottom: 15px; }
        
        .filter-controls {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }
        
        .filter-controls input {
            padding: 10px 15px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.1);
            color: #fff;
            font-size: 0.9rem;
        }
        
        .filter-controls input:focus { outline: none; border-color: #00d2ff; }
        
        table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
        th, td { padding: 12px 15px; text-align: right; border-bottom: 1px solid rgba(255,255,255,0.1); }
        th { background: rgba(0,210,255,0.2); color: #64ffda; font-weight: 600; position: sticky; top: 0; }
        th:first-child, td:first-child { text-align: left; }
        tr:hover { background: rgba(255,255,255,0.05); }
        
        .positive { color: #00ff88; }
        .negative { color: #ff6b6b; }
        .today-row { background: rgba(100,255,218,0.1) !important; }
        .table-scroll { max-height: 400px; overflow-y: auto; }
        
        @media (max-width: 768px) {
            .charts-container { grid-template-columns: 1fr; }
            .kpi-container { grid-template-columns: repeat(2, 1fr); }
            .dashboard-header h1 { font-size: 1.5rem; }
        }
    </style>
</head>

            type: 'bar',
            data: {
                labels: actualData.map(d => d.date),
                datasets: [
                    { label: '계획', data: actualData.map(d => d.plan), backgroundColor: 'rgba(255, 159, 67, 0.8)', borderColor: planColor, borderWidth: 1, borderRadius: 4 },
                    { label: '실적', data: actualData.map(d => d.actual), backgroundColor: 'rgba(0, 210, 255, 0.8)', borderColor: actualColor, borderWidth: 1, borderRadius: 4 }
                ]
            },
            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'top' } }, scales: { y: { beginAtZero: true, grid: { color: 'rgba(255,255,255,0.05)' } }, x: { grid: { display: false } } } }
        });

        // Diff Chart
        new Chart(document.getElementById('diffChart').getContext('2d'), {
            type: 'line',
            data: {
                labels: actualData.map(d => d.date),
                datasets: [{
                    label: '차이 누계',
                    data: actualData.map(d => d.diffCum),
                    borderColor: latestActual.diffCum >= 0 ? '#00ff88' : '#ff6b6b',
                    backgroundColor: latestActual.diffCum >= 0 ? 'rgba(0,255,136,0.2)' : 'rgba(255,107,107,0.2)',
                    fill: true, tension: 0.4, borderWidth: 3
                }]
            },
            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'top' } }, scales: { y: { grid: { color: 'rgba(255,255,255,0.05)' } }, x: { grid: { display: false } } } }
        });

        // Completion Chart
        new Chart(document.getElementById('completionChart').getContext('2d'), {
            type: 'doughnut',
            data: {
                labels: ['실적 완료', '잔여'],
                datasets: [{ data: [latestActual.actualCum, TOTAL_PKG - latestActual.actualCum], backgroundColor: [actualColor, 'rgba(255,255,255,0.1)'], borderWidth: 0 }]
            },
            options: { responsive: true, maintainAspectRatio: false, cutout: '70%', plugins: { legend: { position: 'bottom' } } }
        });

        // Table
        function renderTable(data) {
            const tbody = document.getElementById('tableBody');
            const sortedData = [...data].sort((a, b) => new Date(b.date) - new Date(a.date));
            
            tbody.innerHTML = sortedData.map(d => {
                const diffClass = d.diff !== null ? (d.diff >= 0 ? 'positive' : 'negative') : '';
                const diffCumClass = d.diffCum !== null ? (d.diffCum >= 0 ? 'positive' : 'negative') : '';
                const isLatest = d.date === latestActual.date;
                
                return `
                    <tr class="${isLatest ? 'today-row' : ''}">
                        <td>${d.date}${isLatest ? ' (최근)' : ''}</td>
                        <td>${formatNumber(d.plan)}</td>
                        <td>${formatNumber(d.planCum)}</td>
                        <td>${formatPercent(d.planCumPct)}</td>
                        <td>${d.actual !== null ? formatNumber(d.actual) : '-'}</td>
                        <td>${d.actualCum !== null ? formatNumber(d.actualCum) : '-'}</td>
                        <td>${d.actualCumPct !== null ? formatPercent(d.actualCumPct) : '-'}</td>
                        <td class="${diffClass}">${d.diff !== null ? formatNumber(d.diff) : '-'}</td>
                        <td class="${diffCumClass}">${d.diffCum !== null ? formatNumber(d.diffCum) : '-'}</td>
                        <td class="${diffCumClass}">${d.diffCumPct !== null ? formatPercent(d.diffCumPct) : '-'}</td>
                    </tr>
                `;
            }).join('');
        }

        renderTable(actualData);

        document.getElementById('startDate').addEventListener('change', applyDateFilter);
        document.getElementById('endDate').addEventListener('change', applyDateFilter);

        function applyDateFilter() {
            const start = document.getElementById('startDate').value;
            const end = document.getElementById('endDate').value;
            let filtered = actualData;
            if (start) filtered = filtered.filter(d => d.date >= start);
            if (end) filtered = filtered.filter(d => d.date <= end);
            renderTable(filtered);
        }
    </script>
</body>
</html>
